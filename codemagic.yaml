workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - flutter pub get
      - flutter build ipa --release --export-method=development
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - 200555223@qq.com
